server:
  port: 8888

# 飞书多维表格（飞书连接参数可用环境变量覆盖）
feishu:
  bitable:
    app-id: ${FEISHU_APP_ID:cli_a94fb5909138dbde}
    app-secret: ${FEISHU_APP_SECRET:F5pbn33ngrK1YX4zpC80ibezKCKp1gf7}
    app-token: ${FEISHU_APP_TOKEN:J4zVwHSXQiyK05kBGXJcaJoJnHe}
    open-api-base-url: ${FEISHU_OPEN_API_BASE_URL:https://open.feishu.cn/open-apis/bitable/v1/apps}
    tenant-access-token-url: ${FEISHU_TENANT_TOKEN_URL:https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal}
    batch-limit: ${FEISHU_BATCH_LIMIT:500}
    page-size: ${FEISHU_PAGE_SIZE:100}
    # 多表格：每个 key 对应不同 table-id；需要单独数据源时在对应 table 下配置 retention
    tables:
      retention_daily:
        table-id: ${FEISHU_TABLE_ID:tbldmYq9tgVarQLL}
        columns:
          - feishu-field: 日期
            source-key: date
          - feishu-field: 注册数
            source-key: registerCount
          - feishu-field: 第1天
            source-key: day1Rate
            default-value: "-"
          - feishu-field: 第2天
            source-key: day2Rate
            default-value: "-"
          - feishu-field: 第3天
            source-key: day3Rate
            default-value: "-"
          - feishu-field: 第4天
            source-key: day4Rate
            default-value: "-"
          - feishu-field: 第5天
            source-key: day5Rate
            default-value: "-"
          - feishu-field: 第6天
            source-key: day6Rate
            default-value: "-"
      customer_ratio_daily:
        table-id: ${FEISHU_TABLE_CUSTOMER_RATIO:tblGNEbmtR6oTIET}
        columns:
          - feishu-field: 字段
            source-key: label
          - feishu-field: 人数
            source-key: count
      new_customer_funnel_daily:
        table-id: ${FEISHU_TABLE_NEW_FUNNEL:tblsgt15cfJJCYRH}
        columns:
          - feishu-field: 文本
            source-key: label
          - feishu-field: 数值
            source-key: value
