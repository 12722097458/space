server:
  port: 8888

# 飞书多维表格（飞书连接参数可用环境变量覆盖）
feishu:
  bitable:
    app-id: ${FEISHU_APP_ID:cli_a94fb5909138dbde}
    app-secret: ${FEISHU_APP_SECRET:F5pbn33ngrK1YX4zpC80ibezKCKp1gf7}
    app-token: ${FEISHU_APP_TOKEN:GnkgwMcr3iqUq6kMc5VcYeXrnEf}
    open-api-base-url: ${FEISHU_OPEN_API_BASE_URL:https://open.feishu.cn/open-apis/bitable/v1/apps}
    tenant-access-token-url: ${FEISHU_TENANT_TOKEN_URL:https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal}
    batch-limit: ${FEISHU_BATCH_LIMIT:500}
    page-size: ${FEISHU_PAGE_SIZE:100}
    # 多表格：每个 key 对应不同 table-id；需要单独数据源时在对应 table 下配置 retention
    tables:
      retention_daily:
        table-id: ${FEISHU_TABLE_ID:tblzeA8kxfHHDvbC}    # 5-近7日留存数据（日更）
        columns:
          - feishu-field: 日期
            source-key: date
          - feishu-field: 注册数
            source-key: registerCount
          - feishu-field: 第1天
            source-key: day1Rate
            default-value: "-"
          - feishu-field: 第2天
            source-key: day2Rate
            default-value: "-"
          - feishu-field: 第3天
            source-key: day3Rate
            default-value: "-"
          - feishu-field: 第4天
            source-key: day4Rate
            default-value: "-"
          - feishu-field: 第5天
            source-key: day5Rate
            default-value: "-"
          - feishu-field: 第6天
            source-key: day6Rate
            default-value: "-"
      customer_ratio_daily:
        table-id: ${FEISHU_TABLE_CUSTOMER_RATIO:tblOwkU8XsfwQS33}    # 3-新老客占比（日更）
        columns:
          - feishu-field: 字段
            source-key: label
          - feishu-field: 人数
            source-key: count
      new_customer_funnel_daily:
        table-id: ${FEISHU_TABLE_NEW_FUNNEL:tblm6YLtTzn7LdNn}  # 6-新客漏斗（日更）
        columns:
          - feishu-field: 文本
            source-key: label
          - feishu-field: 数值
            source-key: value
      revenue_daily:
        table-id: ${FEISHU_TABLE_REVENUE:tblwaXGtiftGqEC9}  # 4-订单支付统计（日更）
        columns:
          - feishu-field: 时间
            source-key: time
          - feishu-field: Pro会员订阅人数
            source-key: proMemberUserCount
          - feishu-field: 算力充值人数
            source-key: computeRechargeUserCount
          - feishu-field: 本月总成交金额（会员+算力）
            source-key: totalAmount
      sls_stats_daily:
        table-id: ${FEISHU_TABLE_SLS_STATS:tblghC9iJX9zKboK}    # 1-数据源（日更）
        columns:
          - feishu-field: 日期
            source-key: date
          - feishu-field: 注册数
            source-key: metrics.metricRegisterCount
          - feishu-field: 日活
            source-key: metrics.metricDau
          - feishu-field: 访问量
            source-key: metrics.metricVisitCount
          - feishu-field: 新客访问量
            source-key: metrics.metricNewUserVisitCount
          - feishu-field: 周活
            source-key: metrics.metricWau
          - feishu-field: 月活
            source-key: metrics.metricMau
          - feishu-field: 新客留存
            source-key: metrics.metricNewUserRetention
          - feishu-field: 老客留存
            source-key: metrics.metricOldUserRetention
          - feishu-field: 流失回流
            source-key: metrics.metricReactivatedUsers
          - feishu-field: T0创建
            source-key: metrics.metricCreatedT0Count
          - feishu-field: T7创建
            source-key: metrics.metricCreatedT7Count
          - feishu-field: 登录验证
            source-key: metrics.metricLoginVerificationCount
          - feishu-field: 工作流创建人数
            source-key: metrics.metricWorkflowCreateUsers
          - feishu-field: 工作流运行人数
            source-key: metrics.metricWorkflowRunUsers
          - feishu-field: 工作流发布人数
            source-key: metrics.metricWorkflowPublishUsers
          - feishu-field: 工作流订阅人数
            source-key: metrics.metricWorkflowSubscribeUsers
          - feishu-field: 因子应用人数
            source-key: metrics.metricFactorApplyUsers
          - feishu-field: 策略应用人数
            source-key: metrics.metricStrategyApplyUsers
          - feishu-field: 工作流运行次数
            source-key: metrics.metricWorkflowRunCount
          - feishu-field: 工作流运行成功次数
            source-key: metrics.metricWorkflowRunSuccessCount
          - feishu-field: T1留存率
            source-key: metrics.metricRetentionRateT1
          - feishu-field: T7留存率
            source-key: metrics.metricRetentionRateT7
          - feishu-field: T15留存率
            source-key: metrics.metricRetentionRateT15
          - feishu-field: T30留存率
            source-key: metrics.metricRetentionRateT30
          - feishu-field: T1留存活跃
            source-key: metrics.metricRetentionT1ActiveUsers
          - feishu-field: T1留存注册
            source-key: metrics.metricRetentionT1RegisterUsers
          - feishu-field: T7留存活跃
            source-key: metrics.metricRetentionT7ActiveUsers
          - feishu-field: T7留存注册
            source-key: metrics.metricRetentionT7RegisterUsers
          - feishu-field: T15留存活跃
            source-key: metrics.metricRetentionT15ActiveUsers
          - feishu-field: T15留存注册
            source-key: metrics.metricRetentionT15RegisterUsers
          - feishu-field: T30留存活跃
            source-key: metrics.metricRetentionT30ActiveUsers
          - feishu-field: T30留存注册
            source-key: metrics.metricRetentionT30RegisterUsers
